<!DOCTYPE html>
<html>
<head>
    <title>Access Blocked</title>

    <style>
        body {
            background: linear-gradient(135deg, #ff4d4d, #ff9966);
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding-top: 100px;
            color: white;
        }

        .card {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 20px;
            width: 420px;
            margin: auto;
            box-shadow: 0px 15px 40px rgba(0,0,0,0.3);
        }

        .icon {
            font-size: 50px;
            margin-bottom: 10px;
        }

        h1 {
            color: red;
            margin-bottom: 10px;
        }

        .site {
            font-weight: bold;
            font-size: 18px;
            color: #333;
        }

        .reason {
            margin-top: 10px;
            color: #555;
        }

        .btn {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: red;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            background: #555;
        }
    </style>
</head>

<body>

<div class="card">

    <div class="icon">🚫</div>

    <h1>Access Blocked</h1>

    <p>This website is restricted based on your access level.</p>

    <p><strong>Blocked Site:</strong></p>
    <p class="site" id="site-name"></p>

    <p class="reason" id="reason-text"></p>

    <button class="btn" onclick="goBack()">⬅ Go Back</button>
    <button class="btn btn-secondary" onclick="reloadPage()">🔄 Try Again</button>

</div>

<script>
    const params = new URLSearchParams(window.location.search);

    const site = params.get("site");
    const reason = params.get("reason");

    document.getElementById("site-name").innerText = site || "Unknown";

    document.getElementById("reason-text").innerText =
        "Reason: " + (reason || "Restricted by system rules");

    function goBack() {
        window.history.back();
    }

    function reloadPage() {
        window.location.href = "https://" + site;
    }
</script>

</body>
</html>
