<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Dashboard{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        .sidebar {
            width: 220px;
            height: 100vh;
            background: linear-gradient(180deg, #667eea, #764ba2);
            color: white;
            position: fixed;
            padding: 20px;
        }

        .sidebar h4 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .sidebar a:hover {
            background: rgba(255,255,255,0.2);
        }

        .main-content {
            margin-left: 240px;
            padding: 40px;
        }

        .logout {
            position: absolute;
            bottom: 20px;
            width: 80%;
        }
    </style>
</head>

<body>

<!-- 🔹 Sidebar -->
 
<div class="sidebar">
    <h4>👨‍💻 Control Panel</h4>

    <a href="/dashboard/">🏠 Dashboard</a>

    {% if profile and profile.role == "parent" %}
        <a href="/restricted-urls/">🚫 Restricted URLs</a>
        <a href="/users/">👥 Users</a>
    {% endif %}

    <a href="{% url 'logout' %}" class="btn btn-danger logout">Logout</a>
</div>

<!-- 🔹 Main Content -->
<div class="main-content">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
