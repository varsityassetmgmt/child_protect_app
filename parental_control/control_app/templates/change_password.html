{% extends "base.html" %}

{% block content %}

<div class="card p-4" style="max-width:400px;">
    <h3>Change Password ({{ user.username }})</h3>

    <form method="POST">
        {% csrf_token %}
        <input type="password" name="password" class="form-control mb-3" placeholder="New Password">
        <button class="btn btn-danger">Update Password</button>
    </form>
</div>

{% endblock %}
