{% extends "base.html" %}

{% block content %}

<div class="card p-4" style="max-width:500px;">
    <h3>Edit User</h3>

    <form method="POST">
        {% csrf_token %}

        <h5>User Info</h5>
        {{ user_form.as_p }}

        <h5>Profile Info</h5>
        {{ profile_form.as_p }}

        <button class="btn btn-primary">Update</button>
    </form>
</div>

{% endblock %}
